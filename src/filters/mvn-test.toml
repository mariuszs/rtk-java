[filters.mvn-test]
description = "Compact Maven test output — failures only, strip surefire boilerplate"
match_command = "^(\\.?\\/?)mvnw?\\s+test\\b"
strip_ansi = true
# Stage 2: blank out Maven surefire boilerplate before keep filter
replace = [
  { pattern = "^\\[ERROR\\]\\s*$", replacement = "" },
  { pattern = "^\\[ERROR\\] -> \\[Help.*", replacement = "" },
  { pattern = "^\\[ERROR\\] \\[Help \\d+\\].*", replacement = "" },
  { pattern = "^\\[ERROR\\] See .*/surefire-reports.*", replacement = "" },
  { pattern = "^\\[ERROR\\] See dump files.*", replacement = "" },
  { pattern = "^\\[ERROR\\] To see the full stack trace.*", replacement = "" },
  { pattern = "^\\[ERROR\\] Re-run Maven.*", replacement = "" },
  { pattern = "^\\[ERROR\\] For more information about.*", replacement = "" },
]
keep_lines_matching = [
  "\\[ERROR\\]",
  "\\[WARNING\\]",
  "BUILD (SUCCESS|FAILURE)",
  "Tests run:",
  "<<< FAILURE",
  "<<< ERROR",
  "^\\s+at\\s",
  "Caused by:",
  "Exception",
  "expected:",
  "but was:",
  "Expected",
  "Total time:",
]
max_lines = 50
on_empty = "mvn test: ok (all tests passed)"

[[tests.mvn-test]]
name = "all tests pass returns ok"
input = """
[INFO] Scanning for projects...
[INFO] --- maven-compiler-plugin:3.13.0:compile (default-compile) ---
[INFO] Compiling 5 source files with javac [debug target 25] to target/classes
[INFO] --- maven-surefire-plugin:3.5.4:test (default-test) ---
[INFO] Using auto detected provider org.apache.maven.surefire.junitplatform.JUnitPlatformProvider
[INFO] BUILD SUCCESS
[INFO] Total time:  3.456 s
"""
expected = "[INFO] BUILD SUCCESS\n[INFO] Total time:  3.456 s"

